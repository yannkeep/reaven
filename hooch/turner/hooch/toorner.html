<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #07080a;
  --bg-card: #0c0e12;
  --border: #1a1e25;
  --accent: #00e5a0;
  --accent-dim: #00e5a020;
  --accent-mid: #00e5a060;
  --red: #ff3a5c;
  --amber: #f5a623;
  --cyan: #4dc9f6;
  --purple: #a855f7;
  --text: #c8cdd5;
  --text-dim: #5a6270;
  --text-bright: #eef1f5;
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Outfit', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  overflow-x: hidden;
  cursor: crosshair;
}

/* Noise */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999;
}

/* Scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  pointer-events: none; z-index: 9998;
}

/* Grid BG */
.grid-bg {
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,229,160,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,160,0.025) 1px, transparent 1px);
  background-size: 60px 60px; z-index: -1;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent-mid); border-radius: 2px; }

/* ─── CONTAINER ─── */
.container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 20px; min-height: 100vh; }

/* ─── NAV ─── */
.top-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px;
}
.nav-left { display: flex; align-items: center; gap: 16px; }
.nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 18px; color: var(--accent); letter-spacing: 3px; }
.nav-logo span { color: var(--red); }
.nav-right { display: flex; align-items: center; gap: 12px; }
.status-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 4px var(--accent)} 50%{opacity:.3;box-shadow:0 0 12px var(--accent)} }
.nav-status { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }
.btn-back {
  background: none; border: 1px solid var(--border); color: var(--text-dim);
  padding: 6px 14px; cursor: pointer; font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 1px; transition: all 0.3s; display: none;
}
.btn-back:hover { border-color: var(--accent); color: var(--accent); }
.btn-back.visible { display: inline-block; }

/* ─── OVERVIEW HEADER ─── */
.overview-header { text-align: center; margin-bottom: 50px; }
.header-tag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 16px; border: 1px solid var(--border); border-radius: 20px;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 20px;
}
.header-tag .dot { color: var(--red); font-size: 14px; }
.overview-title {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(2rem, 5vw, 3.5rem); color: var(--text-bright);
  letter-spacing: -1px; margin-bottom: 12px; line-height: 1.1;
}
.overview-sub { font-size: 13px; color: var(--text-dim); max-width: 550px; margin: 0 auto 30px; line-height: 1.7; }
.progress-wrap { max-width: 400px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
.progress-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 2px; transition: width 0.5s; }
.progress-count { font-size: 11px; color: var(--accent); font-weight: 600; }

/* ─── MODULE GRID ─── */
.module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.module-card {
  background: var(--bg-card); border: 1px solid var(--border); padding: 24px;
  cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
}
.module-card:hover { transform: translateY(-3px); }
.module-card .bar-left {
  position: absolute; top: 0; left: 0; width: 3px; height: 0%;
  transition: height 0.5s;
}
.module-card .card-icon { font-size: 28px; margin-bottom: 12px; }
.module-card .card-num { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
.module-card .card-title { font-family: var(--font-display); font-weight: 600; font-size: 16px; color: var(--text-bright); margin-bottom: 8px; }
.module-card .card-desc { font-size: 12px; line-height: 1.6; color: var(--text-dim); margin-bottom: 16px; }
.module-card .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--text-dim); }

/* ─── MODULE DETAIL ─── */
.module-detail { display: none; }
.module-detail.active { display: block; }
.mod-header-icon { font-size: 36px; margin-bottom: 8px; }
.mod-header-num { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
.mod-header-title { font-family: var(--font-display); font-weight: 700; font-size: 28px; color: var(--text-bright); margin-bottom: 8px; }
.mod-header-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
.mod-progress { display: flex; align-items: center; gap: 12px; max-width: 300px; margin-bottom: 36px; }
.mod-progress-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.mod-progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
.mod-progress-pct { font-size: 11px; }

/* ─── LESSON LIST ─── */
.lesson-list { display: flex; flex-direction: column; gap: 12px; }
.lesson-item {
  background: var(--bg-card); border: 1px solid var(--border); padding: 20px 24px;
  cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 16px;
}
.lesson-item:hover { transform: translateX(4px); }
.lesson-num {
  width: 36px; height: 36px; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--text-dim); flex-shrink: 0; transition: all 0.3s;
}
.lesson-num.done { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.06); }
.lesson-info { flex: 1; }
.lesson-title { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--text-bright); margin-bottom: 4px; }
.lesson-meta { display: flex; gap: 12px; font-size: 10px; color: var(--text-dim); }
.lesson-type-tag {
  padding: 1px 8px; border: 1px solid var(--text-dim); text-transform: uppercase; letter-spacing: 1px;
}
.lesson-type-tag.theorie { border-color: var(--text-dim); color: var(--text-dim); }
.lesson-type-tag.pratique { border-color: var(--cyan); color: var(--cyan); }
.lesson-type-tag.exercice { border-color: var(--amber); color: var(--amber); }
.lesson-arrow { font-size: 16px; color: var(--text-dim); }

/* ─── LESSON DETAIL ─── */
.lesson-detail { display: none; max-width: 750px; }
.lesson-detail.active { display: block; }
.lesson-head-tags { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
.lesson-head-title { font-family: var(--font-display); font-weight: 700; font-size: 26px; color: var(--text-bright); margin-bottom: 24px; }

.lesson-content {
  background: var(--bg-card); border: 1px solid var(--border); padding: 32px 28px;
  margin-bottom: 24px; font-size: 13px; line-height: 2;
}
.lesson-content .lc-heading {
  color: var(--text-bright); font-weight: 600; margin-top: 18px; margin-bottom: 6px; font-size: 14px;
}
.lesson-content .lc-heading:first-child { margin-top: 0; }
.lesson-content .lc-bullet { padding-left: 16px; color: var(--text); margin: 2px 0; }
.lesson-content .lc-bullet .bul { margin-right: 6px; }
.lesson-content .lc-text { color: var(--text); margin: 4px 0; }

.links-section { margin-bottom: 30px; }
.links-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
.links-list { display: flex; flex-direction: column; gap: 8px; }
.link-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border: 1px solid var(--border); background: var(--bg-card);
  text-decoration: none; color: var(--text); font-size: 12px; transition: all 0.3s;
}
.link-item:hover { border-color: var(--accent-mid); color: var(--accent); transform: translateX(4px); }
.link-item .link-arrow { color: var(--accent); flex-shrink: 0; }
.link-item .link-label { flex: 1; }
.link-item .link-domain { font-size: 10px; color: var(--text-dim); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.btn-complete {
  width: 100%; padding: 14px 24px; border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-family: var(--font-mono); font-size: 12px;
  letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.3s;
}
.btn-complete:hover { border-color: var(--accent-mid); color: var(--accent); }
.btn-complete.done { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.06); }

/* ─── FOOTER ─── */
.site-footer {
  margin-top: 60px; padding: 24px 0; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); letter-spacing: 1px;
}
.footer-hash { color: var(--accent); opacity: 0.4; }

/* ─── VIEWS ─── */
.view { display: none; }
.view.active { display: block; }

/* ─── RESPONSIVE ─── */
@media (max-width: 640px) {
  .module-grid { grid-template-columns: 1fr; }
  .overview-title { font-size: 2rem; }
}
</style>
</head>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const MODULES = [
  {
    id:"m0", icon:"🧭", title:"Fondamentaux du Renseignement", color:"#00e5a0",
    desc:"Le cycle du renseignement, l'histoire des services, et les principes fondateurs.",
    lessons:[
      { id:"m0l1", title:"Le cycle du renseignement", dur:"45 min", type:"théorie",
        content:[
          {t:"h", v:"Le cycle du renseignement"},
          {t:"p", v:"Le cycle du renseignement est le processus fondamental qui structure toute activité de renseignement. Il se compose de cinq phases interconnectées :"},
          {t:"h", v:"1. Orientation / Direction"},
          {t:"p", v:"Le décideur (politique, militaire ou corporate) définit les besoins en information — les Essential Elements of Information (EEI). En Belgique, c'est le Conseil national de sécurité (CNS) qui fixe les priorités stratégiques de la VSSE."},
          {t:"h", v:"2. Collecte / Recherche"},
          {t:"p", v:"Les agents et analystes recueillent les données brutes via les différentes disciplines : HUMINT (sources humaines), OSINT (sources ouvertes), SIGINT (interceptions), IMINT (imagerie), SOCMINT (réseaux sociaux), etc."},
          {t:"h", v:"3. Traitement / Exploitation"},
          {t:"p", v:"Les données brutes sont converties en informations exploitables : traduction, décryptage, recoupement, structuration dans des bases de données."},
          {t:"h", v:"4. Analyse / Production"},
          {t:"p", v:"L'étape critique. Les analystes transforment l'information en renseignement — une synthèse contextualisée avec évaluation de fiabilité, identification de tendances et formulation d'hypothèses."},
          {t:"h", v:"5. Diffusion"},
          {t:"p", v:"Le renseignement produit est transmis aux décideurs sous forme de notes, rapports ou briefings, en respectant le principe du need-to-know et les niveaux de classification."}
        ],
        links:[
          {label:"Intelligence.gov — How the IC Works", url:"https://www.intelligence.gov/how-the-ic-works"},
          {label:"NATO Intelligence Doctrine (AJP-2)", url:"https://www.nato.int/cps/en/natohq/topics_69275.htm"},
          {label:"UK Gov — National Intelligence Machinery", url:"https://www.gov.uk/government/publications/national-intelligence-machinery"}
        ]
      },
      { id:"m0l2", title:"Panorama des services de renseignement", dur:"60 min", type:"théorie",
        content:[
          {t:"h", v:"Services civils vs militaires"},
          {t:"p", v:"Chaque pays dispose généralement de deux piliers : un service civil (sécurité intérieure) et un service militaire."},
          {t:"b", v:"Belgique : VSSE (civil, ~900 agents) + SGRS/ADIV (militaire)"},
          {t:"b", v:"France : DGSI (intérieur) + DGSE (extérieur)"},
          {t:"b", v:"Royaume-Uni : MI5 (intérieur) + MI6/SIS (extérieur) + GCHQ (SIGINT)"},
          {t:"b", v:"États-Unis : FBI (CI domestique) + CIA (extérieur) + NSA (SIGINT) + 15 autres"},
          {t:"b", v:"Pays-Bas : AIVD (civil) + MIVD (militaire)"},
          {t:"h", v:"Coopération multilatérale"},
          {t:"b", v:"Five Eyes (FVEY) : USA, UK, Canada, Australie, NZ — alliance SIGINT depuis 1946"},
          {t:"b", v:"14 Eyes (SIGINT Seniors Europe) : FVEY + 9 pays européens dont la Belgique"},
          {t:"b", v:"Club de Berne : 29 services civils européens, fondé en 1971"},
          {t:"b", v:"Counter Terrorism Group (CTG) : 30 services, plateforme à La Haye, base « Phoenix »"},
          {t:"b", v:"EU INTCEN : centre d'analyse du renseignement de l'UE"},
          {t:"p", v:"La VSSE entretient des contacts avec plus de 90 services partenaires sur 4 continents."}
        ],
        links:[
          {label:"VSSE — Site officiel", url:"https://vsse.be/fr"},
          {label:"FAS — World Intelligence Agencies", url:"https://irp.fas.org/world/index.html"},
          {label:"EU INTCEN — Intelligence Centre", url:"https://www.eeas.europa.eu/eeas/eu-intelligence-and-situation-centre-eu-intcen_en"}
        ]
      },
      { id:"m0l3", title:"Cadre juridique et éthique", dur:"50 min", type:"théorie",
        content:[
          {t:"h", v:"Le cadre belge comme modèle d'étude"},
          {t:"p", v:"La loi organique du 30 novembre 1998 définit les missions et compétences de la VSSE et du SGRS. La loi BIM (4 février 2010) crée un système à trois niveaux :"},
          {t:"b", v:"Méthodes ordinaires : sources ouvertes, sources humaines — pas d'autorisation spéciale"},
          {t:"b", v:"Méthodes spécifiques : surveillance électronique, observation technique — autorisation du directeur"},
          {t:"b", v:"Méthodes exceptionnelles : écoutes, perquisitions, infiltration — Commission BIM (3 magistrats)"},
          {t:"h", v:"Contrôle démocratique"},
          {t:"p", v:"Le Comité R est l'organe de contrôle parlementaire, créé en 1991. Il contrôle la légalité, l'efficacité, et traite les plaintes citoyennes."},
          {t:"h", v:"Principes éthiques fondamentaux"},
          {t:"b", v:"Proportionnalité : les moyens doivent être proportionnels à la menace"},
          {t:"b", v:"Subsidiarité : méthodes intrusives en dernier recours uniquement"},
          {t:"b", v:"Need-to-know : l'information n'est partagée qu'avec ceux qui en ont besoin"},
          {t:"b", v:"Protection des sources : obligation absolue"}
        ],
        links:[
          {label:"Loi organique 1998 — Justel.be", url:"https://www.ejustice.just.fgov.be/cgi_loi/change_lg.pl?language=fr&la=F&cn=1998113030&table_name=loi"},
          {label:"Comité R — Site officiel", url:"https://www.comiteri.be/"},
          {label:"Venice Commission — Oversight of Intel Services", url:"https://www.venice.coe.int/webforms/documents/default.aspx?pdffile=CDL-AD(2007)016-e"}
        ]
      }
    ]
  },
  {
    id:"m1", icon:"🕵️", title:"HUMINT — Renseignement Humain", color:"#ff3a5c",
    desc:"Recrutement de sources, élicitation, gestion d'agents et techniques d'entretien.",
    lessons:[
      { id:"m1l1", title:"Le recrutement de sources (cycle MICE/RASCLS)", dur:"60 min", type:"théorie",
        content:[
          {t:"h", v:"Les motivations des sources — Modèle MICE"},
          {t:"b", v:"Money (Argent) : compensation financière, courante mais peu fiable"},
          {t:"b", v:"Ideology (Idéologie) : conviction politique, patriotisme, opposition à un régime"},
          {t:"b", v:"Coercion (Contrainte) : chantage, exploitation de vulnérabilités"},
          {t:"b", v:"Ego : besoin de reconnaissance, frustration professionnelle"},
          {t:"h", v:"Modèle étendu RASCLS (Cialdini)"},
          {t:"b", v:"Reciprocity : créer un sentiment d'obligation par des faveurs préalables"},
          {t:"b", v:"Authority : se positionner comme expert ou figure d'autorité"},
          {t:"b", v:"Scarcity : créer un sentiment d'urgence ou d'exclusivité"},
          {t:"b", v:"Commitment/Consistency : petits engagements menant à de plus grands"},
          {t:"b", v:"Liking : construire confiance et affinité"},
          {t:"b", v:"Social proof : montrer que d'autres coopèrent"},
          {t:"h", v:"Les étapes du recrutement"},
          {t:"p", v:"1. Spotting → 2. Assessment → 3. Development → 4. Recruitment (la « pitch ») → 5. Handling → 6. Termination"}
        ],
        links:[
          {label:"Psychology of Intelligence Analysis — Heuer (CIA)", url:"https://www.cia.gov/resources/csi/books-monographs/psychology-of-intelligence-analysis-2/"},
          {label:"HUMINT Field Manual FM 2-22.3 (déclassifié)", url:"https://irp.fas.org/doddir/army/fm2-22-3.pdf"},
          {label:"Robert Cialdini — Influence", url:"https://www.influenceatwork.com/"}
        ]
      },
      { id:"m1l2", title:"Techniques d'élicitation", dur:"45 min", type:"pratique",
        content:[
          {t:"h", v:"L'art d'extraire de l'information"},
          {t:"p", v:"L'élicitation est l'art d'extraire de l'information sans que l'interlocuteur ait conscience de la fournir. Compétence HUMINT la plus polyvalente."},
          {t:"h", v:"Techniques principales"},
          {t:"b", v:"Flatterie : complimenter l'expertise pour encourager à développer"},
          {t:"b", v:"Fausse déclaration : énoncer une info erronée — l'interlocuteur corrige naturellement"},
          {t:"b", v:"Naïveté feinte : jouer l'ignorant pour que la cible explique"},
          {t:"b", v:"Provocation : opinion controversée pour susciter une réaction révélatrice"},

let completed = {};

const totalLessons = MODULES.reduce((a, m) => a + m.lessons.length, 0);

// RENDER FUNCTIONS
// ═══════════════════════════════════════════

function getModuleProgress(mod) {
  const done = mod.lessons.filter(l => completed[l.id]).length;
  return Math.round((done / mod.lessons.length) * 100);
}

function updateGlobalProgress() {
  const count = Object.keys(completed).length;
  const pct = Math.round((count / totalLessons) * 100);
  document.getElementById("navProgress").textContent = pct;
  document.getElementById("mainProgressFill").style.width = pct + "%";
  document.getElementById("completedCount").textContent = count;
}

function renderModuleGrid() {
  const grid = document.getElementById("moduleGrid");
  grid.innerHTML = "";
  MODULES.forEach((mod, i) => {
    const mp = getModuleProgress(mod);
    const card = document.createElement("div");
    card.className = "module-card";
    card.innerHTML = `
      <div class="bar-left" style="background:${mod.color};height:${mp}%"></div>
      <div class="card-icon">${mod.icon}</div>
      <div class="card-num" style="color:${mod.color}">Module ${String(i).padStart(2,"0")}</div>
      <div class="card-title">${mod.title}</div>
      <div class="card-desc">${mod.desc}</div>
      <div class="card-footer">
        <span>${mod.lessons.length} leçons</span>
        <span style="color:${mp===100?"#00e5a0":"#5a6270"}">${mp===100?"✓ COMPLET":mp+"%"}</span>
      </div>
    `;
    card.addEventListener("mouseenter", () => { card.style.borderColor = mod.color+"60"; card.style.boxShadow = `0 8px 30px ${mod.color}10`; });
    card.addEventListener("mouseleave", () => { card.style.borderColor = "#1a1e25"; card.style.boxShadow = "none"; });
    card.addEventListener("click", () => openModule(mod));
    // Encrypt effect on title
    const titleEl = card.querySelector(".card-title");
    titleEl.addEventListener("mouseenter", () => encryptEffect(titleEl, mod.title));
    grid.appendChild(card);
  });
}

function renderModuleDetail(mod) {
  const idx = MODULES.indexOf(mod);
  const mp = getModuleProgress(mod);
  const area = document.getElementById("modHeaderArea");
  area.innerHTML = `
    <div class="mod-header-icon">${mod.icon}</div>
    <div class="mod-header-num" style="color:${mod.color}">Module ${String(idx).padStart(2,"0")}</div>
    <h2 class="mod-header-title">${mod.title}</h2>
    <p class="mod-header-desc">${mod.desc}</p>
    <div class="mod-progress">
      <div class="mod-progress-track"><div class="mod-progress-fill" style="width:${mp}%;background:${mod.color}"></div></div>
      <span class="mod-progress-pct" style="color:${mod.color}">${mp}%</span>
    </div>
  `;
  const list = document.getElementById("lessonList");
  list.innerHTML = "";
  mod.lessons.forEach((lesson, i) => {
    const done = completed[lesson.id];
    const item = document.createElement("div");
    item.className = "lesson-item";
    item.innerHTML = `
      <div class="lesson-num ${done?"done":""}">${done?"✓":String(i+1).padStart(2,"0")}</div>
      <div class="lesson-info">
        <div class="lesson-title">${lesson.title}</div>
        <div class="lesson-meta">
          <span>⏱ ${lesson.dur}</span>
          <span class="lesson-type-tag ${lesson.type}">${lesson.type}</span>
        </div>
      </div>
      <span class="lesson-arrow">→</span>
    `;
    item.addEventListener("mouseenter", () => { item.style.borderColor = mod.color+"60"; });
    item.addEventListener("mouseleave", () => { item.style.borderColor = "#1a1e25"; });
    item.addEventListener("click", () => openLesson(lesson));
    list.appendChild(item);
  });
}

function renderLessonDetail(lesson) {
  const mod = currentModule;
  const area = document.getElementById("lessonArea");
  let html = `
    <div class="lesson-head-tags">
      <span class="lesson-type-tag ${lesson.type}">${lesson.type}</span>
      <span style="font-size:11px;color:#5a6270">⏱ ${lesson.dur}</span>
    </div>
    <h2 class="lesson-head-title">${lesson.title}</h2>
    <div class="lesson-content">
  `;
  lesson.content.forEach(block => {
    if (block.t === "h") html += `<div class="lc-heading">${block.v}</div>`;
    else if (block.t === "b") html += `<div class="lc-bullet"><span class="bul" style="color:${mod.color}">›</span> ${block.v}</div>`;
    else html += `<div class="lc-text">${block.v}</div>`;
  });
  html += `</div>`;

  if (lesson.links && lesson.links.length) {
    html += `<div class="links-section"><div class="links-label">🔗 Ressources pour aller plus loin</div><div class="links-list">`;
    lesson.links.forEach(lk => {
      const domain = lk.url.replace(/https?:\/\/(www\.)?/, "").split("/")[0];
      html += `<a href="${lk.url}" target="_blank" rel="noopener noreferrer" class="link-item">
        <span class="link-arrow">↗</span>
        <span class="link-label">${lk.label}</span>
        <span class="link-domain">${domain}</span>
      </a>`;
    });
    html += `</div></div>`;
  }

  const done = completed[lesson.id];
  html += `<button class="btn-complete ${done?"done":""}" id="btnComplete" onclick="toggleComplete('${lesson.id}')">
    ${done ? "✓ Leçon complétée — Cliquer pour annuler" : "Marquer comme complétée"}
  </button>`;

  area.innerHTML = html;
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════

function showView(name) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById("view" + name.charAt(0).toUpperCase() + name.slice(1)).classList.add("active");
  const btn = document.getElementById("btnBack");
  if (name === "overview") btn.classList.remove("visible");
  else btn.classList.add("visible");
  currentView = name;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function openModule(mod) {
  currentModule = mod;
  renderModuleDetail(mod);
  showView("module");
}

function openLesson(lesson) {
  currentLesson = lesson;
  renderLessonDetail(lesson);
  showView("lesson");
}

function goBack() {
  if (currentView === "lesson") {
    renderModuleDetail(currentModule);
    showView("module");
  } else {
    renderModuleGrid();
    updateGlobalProgress();
    showView("overview");
  }
}

function toggleComplete(lessonId) {
  if (completed[lessonId]) delete completed[lessonId];
  else completed[lessonId] = true;
  // Re-render current lesson
  if (currentLesson) renderLessonDetail(currentLesson);
  updateGlobalProgress();
}

// ═══════════════════════════════════════════
// ENCRYPT TEXT EFFECT
// ═══════════════════════════════════════════
function encryptEffect(el, original) {
  const chars = "█▓▒░@#$%&*αβγδ";
  let i = 0;
  const interval = setInterval(() => {
    el.textContent = original.split("").map((c, idx) =>
      idx < i ? original[idx] : chars[Math.floor(Math.random() * chars.length)]
    ).join("");
    if (i >= original.length) clearInterval(interval);
    i++;
  }, 25);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderModuleGrid();
updateGlobalProgress();
</script>
